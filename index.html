<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PORTAL UJIAN DIGITAL YASPI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; color: #1e293b; height: 100%; overflow-x: hidden; }
    
    .container { max-width: 600px; margin: 15px auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
    img.logo { width: 70px; height: auto; margin-bottom: 10px; }
    h2 { color: #1e3a8a; font-size: 20px; text-transform: uppercase; margin-bottom: 5px; }
    .sub-title { font-size: 13px; color: #64748b; margin-bottom: 20px; }
    
    /* Navigasi Kelas */
    .kelas-selection { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
    .btn-kelas { flex: 1; max-width: 200px; padding: 14px; font-weight: bold; font-size: 16px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .btn-kelas.active { background: #1e3a8a; color: white; }
    
    /* Tabel Roster */
    .roster-area { display: none; margin-top: 15px; text-align: left; }
    .roster-title { font-weight: bold; color: #0f172a; margin-bottom: 10px; border-left: 4px solid #1e3a8a; padding-left: 8px; font-size: 15px; }
    .mapel-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .mapel-info { flex: 1; padding-right: 10px; }
    .mapel-info h4 { font-size: 14px; color: #1e293b; text-transform: uppercase; }
    .mapel-info p { font-size: 12px; color: #64748b; margin-top: 2px; }
    
    /* Desain Tombol Mulai */
    .btn-mulai { padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; transition: background 0.3s; }
    .btn-mulai.sudah-dikerjakan { background: #f59e0b; color: white; }
    
    /* Tombol Navigasi Bawah */
    .btn-kembali { display: none; width: 100%; max-width: 150px; margin: 20px auto 0 auto; padding: 10px; background: #64748b; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }
    
    /* 📱 AREA INTEGRASI GOOGLE FORM (IFRAME) FULL SCREEN */
    #exam-wrapper { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; background: white; z-index: 999; }
    #exam-frame { width: 100%; height: 100%; border: none; }
    
    /* Status Loading */
    #status-loading { color: #3b82f6; font-size: 14px; margin: 15px 0; font-weight: 500; }
  </style>
</head>
<body>

<div class="container" id="main-portal">
  <img src="https://i.ibb.co.com/yFbhLfRF/Logo-Yaspi.png" alt="Logo YASPI" class="logo">
  <h2>PORTAL UJIAN DIGITAL YASPI</h2>
  <p class="sub-title">Silakan pilih kelas Anda untuk melihat jadwal dan mulai ujian.</p>

  <div class="kelas-selection" id="menu-kelas-utama">
    <button class="btn-kelas" onclick="pilihKelas('7', this)">Kelas 7</button>
    <button class="btn-kelas" onclick="pilihKelas('8', this)">Kelas 8</button>
  </div>

  <div id="status-loading">Memuat data ujian dari Google Sheets...</div>
  <div id="roster-container"></div>
  <button class="btn-kembali" id="btn-back-main" onclick="kembaliKeMenuUtama()">⬅️ KEMBALI</button>
</div>

<div id="exam-wrapper">
  <iframe id="exam-frame" src=""></iframe>
</div>

<script>
const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1GmYzAoheln_djGbMDc0aFb9CxkugUbfbVkcliIfnxNc/edit";

let databaseRoster = [];

window.onload = function() {
  ambilDataSpreadsheet();
  
  // Deteksi jika murid menekan tombol kembali di browser/HP saat sedang ujian
  window.addEventListener("popstate", function(event) {
    if (localStorage.getItem("yaspi_ujian_running") === "true") {
      localStorage.removeItem("yaspi_ujian_running");
      location.reload(); // Refresh total balik ke halaman utama kelas
    }
  });
};

function deteksiDanPisahKolom(barisTeks) {
  let karakterPemisah = ",";
  if (barisTeks.includes(";")) {
    let hitungKoma = (barisTeks.match(/,/g) || []).length;
    let hitungTitikKoma = (barisTeks.match(/;/g) || []).length;
    if (hitungTitikKoma > hitungKoma) karakterPemisah = ";";
  }
  return karakterPemisah === "," 
    ? barisTeks.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
    : barisTeks.split(/;(?=(?:(?:[^"]*"){2})*[^"]*$)/);
}

function ambilDataSpreadsheet() {
  const base_url = SPREADSHEET_URL.split("/edit")[0];
  const penandaWaktu = new Date().getTime();
  const urlRoster = base_url + '/gviz/tq?tqx=out:csv&sheet=roster&cb=' + penandaWaktu;

  fetch(urlRoster)
    .then(res => res.text())
    .then(text => {
      document.getElementById("status-loading").style.display = "none";
      let baris = text.split(/\r?\n/);
      databaseRoster = [];
      
      for(let i = 1; i < baris.length; i++) {
        let kolom = deteksiDanPisahKolom(baris[i]);
        if(kolom.length >= 4) {
          databaseRoster.push({
            hari: kolom[0].replace(/"/g, '').trim(),
            kelas: kolom[1].replace(/"/g, '').trim(), 
            mapel: kolom[2].replace(/"/g, '').trim(), 
            link: kolom[3].replace(/"/g, '').trim()   
          });
        }
      }
    })
    .catch(err => {
      document.getElementById("status-loading").innerText = "❌ Gagal memuat database!";
      document.getElementById("status-loading").style.color = "red";
    });
}

function pilihKelas(targetKelas, elemen) {
  document.querySelectorAll('.btn-kelas').forEach(btn => btn.classList.remove('active'));
  elemen.classList.add('active');

  let kontainer = document.getElementById("roster-container");
  kontainer.innerHTML = ""; 

  if (databaseRoster.length === 0) {
    kontainer.innerHTML = "<p style='color:#b91c1c; text-align:center; font-weight:bold; padding:15px;'>Data sedang dimuat, ketuk ulang...</p>";
    return;
  }

  let daftarHariUnik = [...new Set(databaseRoster.map(r => r.hari))];
  let dataDitemukan = false;

  daftarHariUnik.forEach(hariTeks => {
    let mapelHariIni = databaseRoster.filter(r => 
      r.hari.toLowerCase() === hariTeks.toLowerCase() && 
      r.kelas.toString().trim() === targetKelas.toString().trim()
    );
    
    if(mapelHariIni.length > 0) {
      dataDitemukan = true;
      let areaHari = document.createElement("div");
      areaHari.className = "roster-area";
      areaHari.style.display = "block";
      areaHari.innerHTML = `<div class="roster-title">📅 ${hariTeks}</div>`;
      
      mapelHariIni.forEach(m => {
        let card = document.createElement("div");
        card.className = "mapel-card";
        
        let kunciMemoriLokal = "sudah_buka_" + targetKelas + "_" + m.mapel.replace(/\s+/g, '_');
        let statusSudahDikerjakan = localStorage.getItem(kunciMemoriLokal) === "true";
        
        let tombolHtml = "";
        if (m.link.startsWith("http")) {
          if (statusSudahDikerjakan) {
            tombolHtml = `<button class="btn-mulai sudah-dikerjakan" onclick="mulaiUjian('${m.link}', '${kunciMemoriLokal}')">MULAI</button>`;
          } else {
            tombolHtml = `<button class="btn-mulai" onclick="mulaiUjian('${m.link}', '${kunciMemoriLokal}')">MULAI</button>`;
          }
        } else {
          tombolHtml = `<button class="btn-mulai" style="background:#94a3b8; cursor:not-allowed;" disabled>BELUM ADA LINK</button>`;
        }

        card.innerHTML = `
          <div class="mapel-info">
            <h4>${m.mapel}</h4>
            <p>${statusSudahDikerjakan ? "Selesai dikerjakan (Dapat diulang)." : "Klik mulai untuk membuka lembar Google Form ujian."}</p>
          </div>
          ${tombolHtml}
        `;
        areaHari.appendChild(card);
      });
      kontainer.appendChild(areaHari);
    }
  });

  if (!dataDitemukan) {
    kontainer.innerHTML = "<p style='text-align:center; color:#64748b; padding:20px;'>Jadwal kelas ini tidak ditemukan di spreadsheet.</p>";
  }

  document.getElementById("btn-back-main").style.display = "block";
}

function kembaliKeMenuUtama() {
  document.getElementById("roster-container").innerHTML = "";
  document.querySelectorAll('.btn-kelas').forEach(btn => btn.classList.remove('active'));
  document.getElementById("btn-back-main").style.display = "none";
}

function mulaiUjian(linkGoogleForm, kunciMemoriLokal) {
  localStorage.setItem(kunciMemoriLokal, "true");
  localStorage.setItem("yaspi_ujian_running", "true");
  
  // Manipulasi history browser agar ketika murid klik tombol kembali di HP, dia memicu event popstate
  history.pushState({ujian: true}, "");
  
  bukaIframeUjian(linkGoogleForm);
}

function bukaIframeUjian(urlForm) {
  document.getElementById("main-portal").style.display = "none";
  document.getElementById("exam-wrapper").style.display = "block";
  document.getElementById("exam-frame").src = urlForm;
}
</script>
</body>
</html>
